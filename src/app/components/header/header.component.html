<header>
  <!-- <div class="informationView"> -->
  <div class="headerLogoBlock">
    <img src="" alt="Place for logo" />
  </div>
  <div class="headerBannerLoginBlock">
    <div class="bannerBlock">
      <section>
        <article>
          <h1>25% Off all prodcuts</h1>
        </article>
      </section>
    </div>
    <div class="loginBlock">
      <div class="loginIconClass">
        <button type="button" (click)="enableLoginModule()">
          <img src="login1.png" alt="" />
        </button>
        <!-- <a (click)="activateLoginModule()"><img src="login1.png" alt="" /></a> -->
      </div>

      <!-- <app-login></app-login> -->
    </div>
  </div>
  <div class="loginContainer" *ngIf="loginModuleActivated">
    <app-login (loginExit)="disableLoginModule()"></app-login>
  </div>
</header>
