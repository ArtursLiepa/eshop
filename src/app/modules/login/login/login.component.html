<!-- <div class="testBlock">LoginBlock</div> -->
<div class="loginBlock">
  <div class="loginInformationBlock">
    <h2>Login Form</h2>
    <button type="button" class="closeButton" (click)="closeloginForm()">
      X
    </button>
  </div>

  <form [formGroup]="authForm" class="logInFormBlock">
    <div class="usernameBlock">
      <label class="inputLabel" for="username">Username</label>
      <input
        class="textInput"
        id="username"
        type="text"
        placeholder="username"
        formControlName="username"
      />
    </div>

    <div class="passwordBlock">
      <label class="inputLabel" for="password">Password</label>
      <input
        class="textInput"
        id="password"
        type="password"
        placeholder="password"
        formControlName="password"
      />
    </div>

    <div class="buttonsBlock">
      <button type="button" (click)="login()">Enter</button>
      <!-- <button type="button">Exit</button>
      <button type="button">Register</button>
      <a href="">Forget password</a> -->
    </div>
  </form>
</div>
