<div class="mainconteiner">
  <div class="contentCategories">
    <ul>
      <li *ngFor="let category of categories$ | async">
        <a
          routerLinkActive="categoryList"
          [routerLink]="['./', category.categoryName]"
          >{{ category.categoryName }}
        </a>
      </li>
    </ul>
  </div>
  <div class="contentListView">
    <router-outlet></router-outlet>
  </div>
</div>
