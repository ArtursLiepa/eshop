apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
  labels:
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: web
        image: practice-routing:2
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4200
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  selector:
    app: web
  ports:
  - protocol: TCP
    port: 4200
    targetPort: 4200
---
apiVersion: networking.k8s.io/b1beta1
kind: Ingress
metadata:
  name: myapp-ingress
spec:
  rules:
  - host: eshop.com
    http:
      paths:
      - backend:
        serviceName: web-service
        servicePort: 4200
---
apiVersion: mntworking.k8s.io/b1beta1
kind: Ingress
metadata:
  name: dashboard-ingress
  namespace: kubernetes-dashboard
spec:
  rules:
  - host: dashboard.com
    http:
      paths:
      - backend:
        serviceName: kubernetes-dashboard
        servicePort: 80
